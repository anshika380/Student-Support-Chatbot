<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Support Chatbot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy-950: #060a14;
    --navy-900: #0b1220;
    --navy-850: #0e1628;
    --navy-800: #121b30;
    --navy-700: #1a2540;
    --navy-600: #263457;
    --ice: #eaf0ff;
    --ice-dim: #93a3c9;
    --accent: #5eead4;
    --accent-dim: #2dd4bf;
    --accent-soft: rgba(94, 234, 212, 0.12);
    --violet: #818cf8;
    --user-bubble: #2563eb;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background:
      radial-gradient(circle at 10% -10%, rgba(94,234,212,0.10), transparent 42%),
      radial-gradient(circle at 100% 110%, rgba(129,140,248,0.14), transparent 48%),
      var(--navy-950);
    color: var(--ice);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .app {
    width: 100%;
    max-width: 920px;
    height: 88vh;
    max-height: 840px;
    background: var(--navy-900);
    border: 1px solid var(--navy-700);
    border-radius: 20px;
    display: flex;
    overflow: hidden;
    box-shadow: 0 30px 90px rgba(0,0,0,0.55);
  }

  /* ---------- Sidebar ---------- */
  .sidebar {
    width: 250px;
    flex-shrink: 0;
    background: linear-gradient(180deg, var(--navy-850), var(--navy-900));
    border-right: 1px solid var(--navy-700);
    display: flex;
    flex-direction: column;
    padding: 22px 18px;
  }

  .brand { display: flex; align-items: center; gap: 11px; margin-bottom: 26px; }
  .brand-mark {
    width: 38px; height: 38px;
    border-radius: 11px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--violet) 100%);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .brand-mark svg { width: 20px; height: 20px; }
  .brand-name { font-family: 'Sora', sans-serif; font-weight: 700; font-size: 15px; line-height: 1.25; }
  .brand-sub { font-size: 11px; color: var(--ice-dim); display: flex; align-items: center; gap: 5px; margin-top: 2px; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); flex-shrink: 0; }

  .side-label {
    font-size: 10.5px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ice-dim);
    margin: 6px 4px 10px;
    font-weight: 600;
  }

  .cat-list { display: flex; flex-direction: column; gap: 5px; overflow-y: auto; flex: 1; }
  .cat-item {
    padding: 9px 12px;
    border-radius: 10px;
    font-size: 12.8px;
    color: var(--ice-dim);
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.15s ease;
  }
  .cat-item:hover { background: var(--accent-soft); color: var(--accent); border-color: rgba(94,234,212,0.25); }

  .sidebar-footer {
    font-size: 10.5px;
    color: var(--ice-dim);
    padding-top: 14px;
    border-top: 1px solid var(--navy-700);
    line-height: 1.5;
  }
  .sidebar-footer code { color: var(--accent); background: var(--navy-800); padding: 1px 5px; border-radius: 4px; }

  /* ---------- Main chat column ---------- */
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

  .chat-header {
    padding: 18px 24px;
    border-bottom: 1px solid var(--navy-700);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .chat-header h2 { font-family: 'Sora', sans-serif; font-size: 15px; margin: 0; font-weight: 600; }
  .chat-header p { font-size: 11.5px; color: var(--ice-dim); margin: 3px 0 0; }
  .badge {
    font-size: 10.5px;
    background: var(--accent-soft);
    color: var(--accent);
    padding: 4px 10px;
    border-radius: 999px;
    font-weight: 600;
    border: 1px solid rgba(94,234,212,0.25);
  }

  .chat-window {
    flex: 1;
    overflow-y: auto;
    padding: 22px 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .chat-window::-webkit-scrollbar { width: 6px; }
  .chat-window::-webkit-scrollbar-thumb { background: var(--navy-600); border-radius: 3px; }

  .msg-row { display: flex; gap: 10px; max-width: 80%; animation: rise 0.25s ease; }
  .msg-row.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg-row.bot { align-self: flex-start; }
  @keyframes rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  .avatar-sm {
    width: 30px; height: 30px; border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 2px;
  }
  .avatar-sm.bot { background: linear-gradient(135deg, var(--accent), var(--violet)); }
  .avatar-sm.bot svg { width: 16px; height: 16px; }
  .avatar-sm.user { background: var(--navy-700); font-size: 14px; display: flex; align-items: center; justify-content: center; }

  .bubble {
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.55;
    white-space: pre-wrap;
  }
  .msg-row.bot .bubble { background: var(--navy-800); border: 1px solid var(--navy-700); border-top-left-radius: 4px; }
  .msg-row.user .bubble { background: var(--user-bubble); color: white; border-top-right-radius: 4px; }

  .meta { display: flex; align-items: center; gap: 8px; margin-top: 7px; }
  .meta .tag {
    font-size: 10.5px;
    background: var(--accent-soft);
    color: var(--accent);
    padding: 3px 9px;
    border-radius: 999px;
    font-weight: 600;
  }
  .conf-bar { width: 60px; height: 4px; background: var(--navy-700); border-radius: 3px; overflow: hidden; }
  .conf-bar-fill { height: 100%; background: linear-gradient(90deg, var(--violet), var(--accent)); }
  .conf-label { font-size: 10px; color: var(--ice-dim); }

  .suggestions { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 9px; }
  .suggestion-btn {
    font-size: 12px;
    padding: 7px 12px;
    border-radius: 10px;
    background: var(--navy-700);
    border: 1px solid var(--navy-600);
    color: var(--ice);
    cursor: pointer;
    text-align: left;
    transition: all 0.15s ease;
  }
  .suggestion-btn:hover { border-color: var(--accent-dim); color: var(--accent); background: var(--accent-soft); }

  .typing { display: flex; gap: 4px; padding: 7px 4px; }
  .typing span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--ice-dim);
    animation: bounce 1.2s infinite ease-in-out;
  }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-4px); opacity: 1; } }

  .input-bar {
    display: flex;
    gap: 10px;
    padding: 16px 24px 20px;
    border-top: 1px solid var(--navy-700);
  }
  .input-bar input {
    flex: 1;
    background: var(--navy-800);
    border: 1px solid var(--navy-600);
    border-radius: 12px;
    padding: 13px 15px;
    color: var(--ice);
    font-size: 14px;
    outline: none;
    font-family: 'Inter', sans-serif;
  }
  .input-bar input:focus { border-color: var(--accent-dim); box-shadow: 0 0 0 3px var(--accent-soft); }
  .input-bar input::placeholder { color: var(--ice-dim); }

  .send-btn {
    background: linear-gradient(135deg, var(--accent), var(--violet));
    border: none;
    border-radius: 12px;
    width: 48px;
    color: var(--navy-950);
    font-weight: 700;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.12s ease;
  }
  .send-btn:hover { transform: scale(1.06); }
  .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  @media (max-width: 720px) {
    .sidebar { display: none; }
    .app { max-width: 480px; }
  }
</style>
</head>
<body>

<div class="app">

  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 3L2 8L12 13L22 8L12 3Z" stroke="#060a14" stroke-width="1.8" stroke-linejoin="round"/>
          <path d="M6 10.5V16C6 16 8.5 18 12 18C15.5 18 18 16 18 16V10.5" stroke="#060a14" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div>
        <div class="brand-name">Student Support<br/>Chatbot</div>
        <div class="brand-sub"><span class="status-dot"></span> Semantic search · SBERT</div>
      </div>
    </div>

    <div class="side-label">Browse Topics</div>
    <div class="cat-list" id="categories"></div>

    <div class="sidebar-footer">
      Backend: <code id="api-base-display">localhost:8000</code>
    </div>
  </aside>

  <div class="main">
    <div class="chat-header">
      <div>
        <h2>Ask me anything</h2>
        <p>Admissions · Exams · Fees · Hostel · Placements</p>
      </div>
      <div class="badge">AI-powered</div>
    </div>

    <div class="chat-window" id="chat-window"></div>

    <div class="input-bar">
      <input type="text" id="user-input" placeholder="Type your question..." />
      <button class="send-btn" id="send-btn" onclick="sendMessage()">➤</button>
    </div>
  </div>

</div>

<script>
  const API_BASE = "http://localhost:8000";
  let sessionId = null;

  const chatWindow = document.getElementById("chat-window");
  const input = document.getElementById("user-input");
  const sendBtn = document.getElementById("send-btn");

  const botIconSVG = `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M12 3L2 8L12 13L22 8L12 3Z" stroke="#060a14" stroke-width="1.8" stroke-linejoin="round"/>
    <path d="M6 10.5V16C6 16 8.5 18 12 18C15.5 18 18 16 18 16V10.5" stroke="#060a14" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;

  function addMessage(role, text, meta) {
    const row = document.createElement("div");
    row.className = `msg-row ${role}`;

    const avatar = document.createElement("div");
    avatar.className = `avatar-sm ${role}`;
    avatar.innerHTML = role === "bot" ? botIconSVG : "🙂";

    const content = document.createElement("div");

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;
    content.appendChild(bubble);

    if (meta && meta.category) {
      const metaEl = document.createElement("div");
      metaEl.className = "meta";
      const pct = Math.round(meta.confidence * 100);
      metaEl.innerHTML = `
        <span class="tag">${meta.category}</span>
        <div class="conf-bar"><div class="conf-bar-fill" style="width:${pct}%"></div></div>
        <span class="conf-label">${pct}%</span>
      `;
      content.appendChild(metaEl);
    }

    if (meta && meta.suggestions && meta.suggestions.length) {
      const sugWrap = document.createElement("div");
      sugWrap.className = "suggestions";
      meta.suggestions.forEach(s => {
        const btn = document.createElement("button");
        btn.className = "suggestion-btn";
        btn.textContent = s;
        btn.onclick = () => { input.value = s; sendMessage(); };
        sugWrap.appendChild(btn);
      });
      content.appendChild(sugWrap);
    }

    row.appendChild(avatar);
    row.appendChild(content);
    chatWindow.appendChild(row);
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  function showTyping() {
    const row = document.createElement("div");
    row.className = "msg-row bot";
    row.id = "typing-row";
    row.innerHTML = `
      <div class="avatar-sm bot">${botIconSVG}</div>
      <div class="bubble typing"><span></span><span></span><span></span></div>
    `;
    chatWindow.appendChild(row);
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  function hideTyping() {
    const row = document.getElementById("typing-row");
    if (row) row.remove();
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    addMessage("user", text);
    input.value = "";
    sendBtn.disabled = true;
    showTyping();

    try {
      const res = await fetch(`${API_BASE}/api/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text, session_id: sessionId }),
      });
      const data = await res.json();
      sessionId = data.session_id;
      hideTyping();
      addMessage("bot", data.response, {
        category: data.category,
        confidence: data.confidence,
        suggestions: data.suggestions,
      });
    } catch (err) {
      hideTyping();
      addMessage("bot", "I couldn't reach the server. Make sure the FastAPI backend is running on " + API_BASE + ".");
    } finally {
      sendBtn.disabled = false;
    }
  }

  input.addEventListener("keydown", e => { if (e.key === "Enter") sendMessage(); });

  async function loadCategories() {
    try {
      const res = await fetch(`${API_BASE}/api/categories`);
      const data = await res.json();
      const wrap = document.getElementById("categories");
      data.categories.forEach(cat => {
        const item = document.createElement("div");
        item.className = "cat-item";
        item.textContent = cat;
        item.onclick = () => { input.value = `Tell me about ${cat}`; sendMessage(); };
        wrap.appendChild(item);
      });
    } catch (e) {
      console.warn("Could not load categories — is the backend running?");
    }
  }

  addMessage("bot", "Hi! I'm your Student Support Chatbot 👋 Ask me about admissions, exams, fees, hostel, library, placements, or IT support.");
  loadCategories();
</script>

</body>
</html>
